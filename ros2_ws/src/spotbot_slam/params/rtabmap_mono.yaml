rtabmap:
  ros__parameters:
    # Visual features
    Vis/MinInliers: "10"
    Vis/MaxDepth: "0"
    Vis/FeatureType: "8"
    Vis/MaxFeatures: "500"
    Vis/GridRows: "1"
    Vis/GridCols: "1"

    # RGBD updates
    RGBD/AngularUpdate: "0.05"
    RGBD/LinearUpdate: "0.05"
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/ProximityBySpace: "true"
    RGBD/ProximityPathMaxNeighbors: "10"

    # Memory
    Mem/STMSize: "30"
    Mem/RehearsalSimilarity: "0.45"
    Mem/BinDataKept: "false"

    # Registration
    Reg/Strategy: "0"
    Reg/Force3DoF: "true"

    # Optimizer
    Optimizer/Strategy: "2"
    Optimizer/Iterations: "20"

    # Grid
    Grid/RangeMin: "0.1"
    Grid/RangeMax: "5.0"
    Grid/CellSize: "0.05"
    Grid/3D: "false"

    # Subscriptions
    subscribe_rgb: true
    subscribe_depth: false
    subscribe_stereo: false
    frame_id: "base_link"
    map_frame_id: "map"
    odom_frame_id: "odom"
    publish_tf: true
    tf_delay: 0.05
